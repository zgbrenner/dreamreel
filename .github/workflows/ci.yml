name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  app:
    name: app — typecheck / lint / unit / build / licenses
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test
      - run: npm run build
      - name: Dependency license gate (ship-safe only)
        run: npm run license:check

  pipeline:
    name: pipeline — pytest / license gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pipeline
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Create isolated venv with only pipeline deps
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip
          pip install pydantic numpy requests Pillow pytest
      - name: Unit tests (license policy + manifest shape)
        run: |
          . .venv/bin/activate
          python -m pytest -q
      - name: Python dependency license gate
        run: |
          . .venv/bin/activate
          python scripts/check_licenses.py

  manifest-contract:
    name: pipeline output validates against app loader
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Build a manifest (offline fallback embedder)
        working-directory: pipeline
        run: |
          pip install pydantic numpy
          python -m embed.build_manifest --out out
      - name: Validate it with the app's zod loader
        working-directory: app
        run: |
          npm ci
          npx tsx scripts/validate-manifest.ts ../pipeline/out/manifest.json

  e2e:
    name: playwright smoke (main)
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Smoke test (load, play, 30s, no console errors)
        run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: app/playwright-report
          retention-days: 7
